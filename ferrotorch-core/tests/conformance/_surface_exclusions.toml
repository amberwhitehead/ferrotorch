# Strict coverage-gate exclusions for the ferrotorch-core conformance suite.
#
# Gate: tests/conformance_surface_coverage.rs. Original phase-2.0 mandate
# (#759): every `pub` item in ferrotorch-core MUST be either (a) referenced
# from at least one `tests/conformance_*.rs` source file, OR (b) listed here.
# New `pub` items added without one of these two states fail CI.
#
# Every entry carries a `kind` field (CORE-195 / #1889 remediation):
#
#   kind = "permanent" — gate-limitation annotation. The item IS tested, but
#     the gate's substring scan over tests/conformance_*.rs cannot see the
#     coverage (re-export ident absent from conformance sources, grad_fn
#     struct exercised via its op's grad assertion, method covered by a
#     type-level integration test, src-side #[cfg(test)] live-torch suite,
#     ...). The `reason` MUST name where the coverage actually lives and must
#     contain one of the coverage-location markers enforced by
#     `exclusion_tracking_issues_are_live` in the gate. `tracking_issue` is
#     OPTIONAL for these entries (closed historical phase issues are noted
#     inside `reason` where useful).
#
#   kind = "deferred" — conformance coverage genuinely not yet authored.
#     `tracking_issue` is REQUIRED, must be `#NNN`, and must be OPEN in the
#     committed snapshot `_tracking_issue_status.json` (refreshed locally via
#     `python3 scripts/refresh_exclusion_issue_status.py`; the .crosslink
#     issue DB is gitignored so CI checks the snapshot, and the snapshot
#     expires after 45 days). A deferred exclusion pointing at a closed
#     issue is indefinite deferral and the gate rejects it.
#
# Burndown issues (one per family, superseding the closed phase issues):
#   #1913 — elementwise        (was #763, Phase 2.1)
#   #1914 — reduction          (was #764, Phase 2.2)
#   #1915 — shape              (was #765, Phase 2.3)
#   #1916 — linalg             (was #766, Phase 2.4)
#   #1917 — special-transcendental (was #767, Phase 2.5)
#   #1918 — fft-complex        (was #769, Phase 2.7)
#   #1919 — quantize-prune     (was #771, Phase 2.9)
#   #1920 — bool-int           (was #775, Phase 2.13)
#   #1921 — plumbing           (was #776, Phase 2.14)
#   #1682 — GPU on-device RNG (open feature issue; owns the rand/randn
#           *_on_device CUDA-conformance deferrals)
#
# Format: `[[exclusion]]` table-array entries:
#   path           — fully qualified item path as written in `_surface.json`
#   kind           — "permanent" | "deferred" (see above)
#   reason         — one or more sentences (not a placeholder)
#   tracking_issue — `#NNN`; required for kind = "deferred"
#
# Entries are retired by replacing them with real conformance tests.

