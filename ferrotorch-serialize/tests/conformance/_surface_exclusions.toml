# ferrotorch-serialize surface exclusions
# Items listed here are intentionally excluded from the strict conformance gate.
# Each entry requires: path, reason, tracking_issue.
#
# Format mirrors ferrotorch-core's _surface_exclusions.toml.
# tracking_issue must be #NNN or a full https:// URL — "TBD"/"pending"/etc. fail the gate.

# ── AsyncCheckpointer ────────────────────────────────────────────────────────
# Closed by #852: conformance_serialize_async.rs provides full conformance
# tests for AsyncCheckpointer (save/wait/load round-trip, sequential saves,
# is_saving() flag, Default, Debug, and invalid-path error propagation).
# AsyncCheckpointer uses std::thread internally — no Tokio runtime needed.
# (No exclusion entries remain for #852.)

# ── GGUF file-format items ───────────────────────────────────────────────────
# GgufFile, GgufMetadata, GgufTensorInfo, GgufValue, load_gguf, load_gguf_mmap,
# load_gguf_state_dict, load_gguf_state_dict_mmap, parse_gguf_bytes and
# dequantize_gguf_tensor all require a real GGUF binary blob. Generating a
# synthetic GGUF fixture that covers the full header+metadata+tensor-info
# protocol is a non-trivial binary-generation task tracked separately.
[[exclusion]]
path = "ferrotorch_serialize::GgufFile"
reason = "Requires a real GGUF binary fixture; synthetic GGUF generation tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::GgufMetadata"
reason = "Implicit coverage through GgufFile; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::GgufTensorInfo"
reason = "Implicit coverage through GgufFile; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::GgufValue"
reason = "Implicit coverage through GgufFile metadata parsing; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::GgmlType"
reason = "Implicit coverage through GGUF tensor-info parsing; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::dequantize_gguf_tensor"
reason = "Requires a real GGUF quantized tensor blob; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::load_gguf"
reason = "Requires a real GGUF file on disk; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::load_gguf_mmap"
reason = "Requires a real GGUF file on disk (mmap variant); synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::load_gguf_state_dict"
reason = "Requires a real GGUF file on disk; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::load_gguf_state_dict_mmap"
reason = "Requires a real GGUF file on disk (mmap variant); synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

[[exclusion]]
path = "ferrotorch_serialize::parse_gguf_bytes"
reason = "Requires valid GGUF binary bytes; synthetic GGUF fixture tracked in #848."
tracking_issue = "#848"

# ── ONNX export ──────────────────────────────────────────────────────────────
# ONNX export requires a live IR graph produced by the JIT compiler
# (ferrotorch-jit) and is not exercisable at fixture level without a complete
# trace/compile pipeline. Tracked separately in the JIT conformance work.
[[exclusion]]
path = "ferrotorch_serialize::OnnxExportConfig"
reason = "ONNX export requires a live IR graph from ferrotorch-jit; deferred to JIT conformance suite (#849)."
tracking_issue = "#849"

[[exclusion]]
path = "ferrotorch_serialize::export_onnx"
reason = "Requires a live IR graph from ferrotorch-jit; deferred to JIT conformance suite (#849)."
tracking_issue = "#849"

[[exclusion]]
path = "ferrotorch_serialize::export_from_program"
reason = "Requires a live ExportedProgram from ferrotorch-jit; deferred to JIT conformance suite (#849)."
tracking_issue = "#849"

[[exclusion]]
path = "ferrotorch_serialize::export_ir_graph_to_onnx"
reason = "Requires a live IrGraph from ferrotorch-jit; deferred to JIT conformance suite (#849)."
tracking_issue = "#849"

[[exclusion]]
path = "ferrotorch_serialize::ir_graph_to_onnx"
reason = "Requires a live IrGraph from ferrotorch-jit; deferred to JIT conformance suite (#849)."
tracking_issue = "#849"

