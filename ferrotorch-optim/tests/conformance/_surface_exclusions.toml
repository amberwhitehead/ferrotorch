# Surface exclusions for ferrotorch-optim conformance suite.
# Each entry explains WHY an item is not covered by a conformance test.
#
# Exclusion reasons:
#   implicit   — coverage is provided transitively by a tested item
#   structural — struct fields, type aliases, re-exports; no independent behaviour
#   live-env   — requires GPU, live training loop, or external binary
#   deferred   — covered by a future sub-phase (noted in c6_phase field)
#
# Items here are EXCLUDED from the Layer-4 coverage gate (to be authored in C6.4 wrap-up).

# ---------------------------------------------------------------------------
# Optimizer trait: method coverage provided by optimizer-specific tests
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferrotorch_optim::optimizer::Optimizer::step"
reason = "implicit"
note = "Covered by every step-by-step conformance test in conformance_optim_sgd_family.rs and future sub-phase tests."

[[exclusion]]
