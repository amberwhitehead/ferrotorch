# ---------------------------------------------------------------------------
# Schedulers: C6.4 — exclusions for items covered implicitly or structurally
# ---------------------------------------------------------------------------
# Note: conformance_optim_schedulers.rs (C6.4) directly tests all 12 scheduler
# types with fixture-driven reference sequences. The items below are excluded
# because they are either:
#   - Enum/trait/function types with no independent behaviour beyond what the
#     struct tests exercise (structural/implicit), OR
#   - Closure-based schedulers (LambdaLR, MultiplicativeLR, ChainedScheduler)
#     that cannot be pinned to a static reference fixture because their output
#     depends on a user-supplied closure.

# Traits — covered by every scheduler conformance test via LrScheduler::step
[[exclusion]]
path = "ferrotorch_optim::scheduler::LrScheduler"
reason = "implicit"
note = "Exercised by every scheduler conformance test in conformance_optim_schedulers.rs via the trait bound on MockOptimizer."

[[exclusion]]
path = "ferrotorch_optim::scheduler::LrScheduler::step"
reason = "implicit"
note = "Called in every scheduler fixture loop in conformance_optim_schedulers.rs."

[[exclusion]]
path = "ferrotorch_optim::scheduler::LrScheduler::get_lr"
reason = "implicit"
note = "Verified via sched.get_lr() assertion in step_lr_matches_reference."

[[exclusion]]
path = "ferrotorch_optim::scheduler::MetricScheduler"
reason = "implicit"
note = "Exercised by reduce_lr_on_plateau_matches_reference via MetricScheduler<f32>::step."

# SequentialLr and cosine_warmup_scheduler — tested by unit tests in scheduler/mod.rs;
# no separate reference fixture needed (behaviour is compositional, not a PyTorch primitive).
[[exclusion]]
path = "ferrotorch_optim::scheduler::SequentialLr"
reason = "implicit"
note = "Covered by unit tests in src/scheduler/mod.rs; no torch.optim.lr_scheduler counterpart to fixture against."

[[exclusion]]
path = "ferrotorch_optim::scheduler::SequentialLr::new"
reason = "implicit"
note = "Implicit via SequentialLr unit tests."

[[exclusion]]
path = "ferrotorch_optim::scheduler::cosine_warmup_scheduler"
