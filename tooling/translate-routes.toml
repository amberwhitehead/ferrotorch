# translate-routes.toml — read-gate route table
#
# Consumed by tooling/translate-discipline.py to gate Edit/Write
# on ferrotorch-*/src/**/*.rs files. Each [[route]] declares:
#
#   crate_pattern : exact path or glob matched against the repo-relative
#                   target file.
#   upstream      : list of /home/doll/pytorch/<path> files at least ONE
#                   of which must be Read before the edit.
#   design        : path to the .design/<crate>/<inside-src>.md governing
#                   this translation. MUST exist on disk; if missing, the
#                   hook blocks with acto-doc-author dispatch instructions.
#   parity_ops    : (optional) list of parity-sweep op names this file is
#                   responsible for. The per-op smoke gate runs each
#                   listed op via `parity-sweep sweep --op <name> --seeds 8`
#                   and requires the integer grep count >= 1 (R-DEFER-6).
#                   Empty list = no parity op directly owned (file is a
#                   helper / utility; cargo test of the crate is the gate).
#
# Additionally, every gated edit requires Read of goal.md in the same
# session (the global discipline file).
#
# This file was generated by tooling/generate-routes.py over every
# ferrotorch-*/src/**/*.rs file in the workspace (435 routes). Files
# with a strong PyTorch counterpart get specific upstream paths; the
# rest get the per-crate broad fallback (the relevant pytorch subtree)
# and an acto-doc-author / acto-critic pass will narrow them as work
# progresses.
#
# ferrotorch-nn-derive is a proc-macro crate with no PyTorch counterpart
# and is excluded from the gate at the hook level (no route needed).


